name: Bug report
description: Report a reproducible problem in code or documentation.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never include live API keys, private endpoint URLs, or customer data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the command, sanitized configuration, operating system, and runtime version.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Sanitized output
      description: Remove secrets and private data before pasting logs.
